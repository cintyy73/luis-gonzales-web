<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Luis Gonzalez">
  <rect width="100" height="100" rx="18" fill="#000000"/>

  <!-- Snowflake (left half + central spine) -->
  <g stroke="#2E9BFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Vertical spine (central divider) -->
    <line x1="50" y1="10" x2="50" y2="90"/>
    <polyline points="42,16 50,10 58,16"/>
    <polyline points="42,84 50,90 58,84"/>

    <!-- Horizontal-left arm -->
    <line x1="50" y1="50" x2="8" y2="50"/>
    <polyline points="14,44 8,50 14,56"/>

    <!-- Upper-left diagonal arm -->
    <line x1="50" y1="50" x2="15" y2="22"/>
    <polyline points="22,20 15,22 17,29"/>

    <!-- Lower-left diagonal arm -->
    <line x1="50" y1="50" x2="15" y2="78"/>
    <polyline points="17,71 15,78 22,80"/>
  </g>

  <!-- Half sun (right half) -->
  <path d="M 50 32 A 18 18 0 0 1 50 68 Z" fill="#F97316"/>
  <g stroke="#F97316" stroke-width="5" stroke-linecap="round">
    <line x1="74" y1="50" x2="92" y2="50"/>
    <line x1="72" y1="38" x2="86" y2="30"/>
    <line x1="72" y1="62" x2="86" y2="70"/>
    <line x1="65" y1="29" x2="73" y2="15"/>
    <line x1="65" y1="71" x2="73" y2="85"/>
    <line x1="56" y1="22" x2="56" y2="8"/>
    <line x1="56" y1="78" x2="56" y2="92"/>
  </g>
</svg>
